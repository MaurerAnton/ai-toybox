<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLI-LOG — Daily Shell Report</title>
<link rel="stylesheet" href="../core/theme.css">
<style>
  body { display: block; }
  .app { flex-direction: column; min-height: 100vh; }

  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 16px; letter-spacing: 4px; color: var(--amber); }
  .header .sub { font-size: 10px; color: var(--grey); letter-spacing: 2px; }

  .nav-bar {
    display: flex;
    gap: 4px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 6px 24px;
    overflow-x: auto;
  }
  .nav-bar a {
    color: var(--grey);
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .nav-bar a:hover { border-color: var(--border); color: var(--text); }
  .nav-bar a.active { border-color: var(--amber); color: var(--amber); background: rgba(255,170,0,0.05); }

  .content {
    flex: 1;
    padding: 24px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 48px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 24px;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--amber);
    background: rgba(255,170,0,0.05);
  }
  .drop-zone h2 {
    font-size: 14px;
    color: var(--amber);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .drop-zone p {
    font-size: 12px;
    color: var(--grey);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .val {
    font-size: 28px;
    font-weight: bold;
    color: var(--amber);
  }
  .stat-card .label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--grey);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .report-section {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    background: var(--bg2);
    margin-bottom: 16px;
  }
  .report-section h3 {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--amber);
    margin-bottom: 12px;
  }
  .report-text {
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .cmd-list {
    max-height: 400px;
    overflow-y: auto;
    font-size: 12px;
  }
  .cmd-row {
    display: flex;
    gap: 12px;
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
  }
  .cmd-row:hover { background: var(--bg3); }
  .cmd-time { color: var(--grey); min-width: 80px; }
  .cmd-text { color: var(--text); flex: 1; }
  .cmd-repo { color: var(--purple); font-size: 10px; min-width: 80px; }
  .cmd-code-ok { color: var(--green); }
  .cmd-code-err { color: var(--red); font-weight: bold; }

  .category-bar {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .cat-segment {
    height: 20px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--bg);
    min-width: 30px;
    transition: all 0.3s;
  }
  .cat-segment:hover { opacity: 0.8; }

  .legend {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--grey);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>CLI-LOG</h1>
      <div class="sub">DAILY SHELL REPORT</div>
    </div>
    <button class="btn" onclick="CONFIG.createPanel()">CONFIG</button>
  </div>
  <div class="nav-bar">
    <a href="../bookforge/">BOOKFORGE</a>
    <a href="../alien/">ALIEN</a>
    <a href="../hobby/">HOBBY</a>
    <a href="../cli-log/" class="active">CLI-LOG</a>
    <a href="../charforge/">CHARFORGE</a>
  </div>

  <div class="content">
    <div class="drop-zone" id="drop-zone">
      <h2>DROP .jsonl FILE HERE</h2>
      <p>or click to browse — files from ~/.cli-log/YYYY-MM-DD.jsonl</p>
      <input type="file" id="file-input" accept=".jsonl" style="display:none">
    </div>

    <div id="report" style="display:none">
      <div class="stats-grid" id="stats-grid"></div>

      <div class="report-section">
        <h3>COMMAND DISTRIBUTION</h3>
        <div class="category-bar" id="category-bar"></div>
        <div class="legend" id="legend"></div>
      </div>

      <div class="report-section">
        <h3>AI ANALYSIS</h3>
        <div class="report-text" id="ai-report">Generating analysis...</div>
      </div>

      <div class="report-section">
        <h3>COMMANDS</h3>
        <div class="cmd-list" id="cmd-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="../core/ai-core.js"></script>
<script src="../core/config.js"></script>
<script>CONFIG.checkFirstRun();</script>
<script>
var commands = [];

// Drop zone
var dropZone = document.getElementById('drop-zone');
var fileInput = document.getElementById('file-input');

dropZone.onclick = function() { fileInput.click(); };
dropZone.ondragover = function(e) { e.preventDefault(); dropZone.classList.add('dragover'); };
dropZone.ondragleave = function() { dropZone.classList.remove('dragover'); };
dropZone.ondrop = function(e) {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  var file = e.dataTransfer.files[0];
  if (file) loadFile(file);
};
fileInput.onchange = function(e) {
  if (e.target.files[0]) loadFile(e.target.files[0]);
};

function loadFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var lines = e.target.result.split('\n').filter(function(l) { return l.trim(); });
    commands = [];
    lines.forEach(function(line) {
      try { commands.push(JSON.parse(line)); } catch(ex) {}
    });
    if (commands.length === 0) {
      alert('No valid commands found in file.');
      return;
    }
    renderReport();
    generateAIReport();
  };
  reader.readAsText(file);
}

function renderReport() {
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('report').style.display = 'block';

  // Stats
  var total = commands.length;
  var errors = commands.filter(function(c) { return c.code && c.code !== 0; }).length;
  var repos = {};
  commands.forEach(function(c) { if (c.repo) repos[c.repo] = true; });
  var uniqueRepos = Object.keys(repos).length;

  var firstTime = commands[0].t || '';
  var lastTime = commands[commands.length-1].t || '';

  var grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  addStat(grid, total, 'TOTAL COMMANDS');
  addStat(grid, errors, 'ERRORS');
  addStat(grid, uniqueRepos, 'REPOSITORIES');
  addStat(grid, Math.round(errors/total*100) + '%', 'ERROR RATE');

  // Categorize commands
  var categories = categorize(commands);
  renderCategoryBar(categories);

  // Command list
  var list = document.getElementById('cmd-list');
  list.innerHTML = '';
  commands.forEach(function(c) {
    var row = document.createElement('div');
    row.className = 'cmd-row';
    var time = (c.t || '').substring(11, 19);
    var codeClass = c.code && c.code !== 0 ? 'cmd-code-err' : 'cmd-code-ok';
    row.innerHTML = '<span class="cmd-time">' + time + '</span>' +
      '<span class="cmd-code-ok ' + codeClass + '">[' + (c.code || 0) + ']</span>' +
      '<span class="cmd-text">' + escHtml(c.cmd || '') + '</span>' +
      '<span class="cmd-repo">' + escHtml(c.repo || '') + '</span>';
    list.appendChild(row);
  });
}

function addStat(parent, val, label) {
  var card = document.createElement('div');
  card.className = 'stat-card';
  card.innerHTML = '<div class="val">' + val + '</div><div class="label">' + label + '</div>';
  parent.appendChild(card);
}

function categorize(cmds) {
  var cats = {
    'git': {color: '#ff6b35', count: 0, patterns: [/^git\s/]},
    'npm/node': {color: '#00cc66', count: 0, patterns: [/^(npm|npx|node|yarn)\s/]},
    'python': {color: '#3b82f6', count: 0, patterns: [/^(python|pip|pytest)\s/]},
    'docker': {color: '#0ea5e9', count: 0, patterns: [/^(docker|docker-compose)\s/]},
    'ssh/scp': {color: '#a855f7', count: 0, patterns: [/^(ssh|scp|rsync)\s/]},
    'file ops': {color: '#eab308', count: 0, patterns: [/^(ls|cd|cp|mv|rm|mkdir|find|cat|head|tail|grep|touch|chmod|chown)\b/]},
    'system': {color: '#ef4444', count: 0, patterns: [/^(sudo|systemctl|journalctl|apt|pacman|brew|dnf)\s/]},
    'other': {color: '#6b7280', count: 0, patterns: []}
  };

  cmds.forEach(function(c) {
    var cmd = (c.cmd || '').trim();
    var matched = false;
    for (var cat in cats) {
      if (cat === 'other') continue;
      for (var i = 0; i < cats[cat].patterns.length; i++) {
        if (cats[cat].patterns[i].test(cmd)) {
          cats[cat].count++;
          matched = true;
          break;
        }
      }
      if (matched) break;
    }
    if (!matched) cats['other'].count++;
  });

  return cats;
}

function renderCategoryBar(cats) {
  var total = commands.length;
  var bar = document.getElementById('category-bar');
  var legend = document.getElementById('legend');
  bar.innerHTML = '';
  legend.innerHTML = '';

  for (var name in cats) {
    if (cats[name].count === 0) continue;
    var pct = (cats[name].count / total * 100);
    var seg = document.createElement('div');
    seg.className = 'cat-segment';
    seg.style.width = pct + '%';
    seg.style.background = cats[name].color;
    seg.textContent = pct > 5 ? name : '';
    bar.appendChild(seg);

    var item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<span class="legend-dot" style="background:' + cats[name].color + '"></span>' + name + ' (' + cats[name].count + ')';
    legend.appendChild(item);
  }
}

async function generateAIReport() {
  var reportEl = document.getElementById('ai-report');
  reportEl.textContent = 'Generating AI analysis...';

  // Build summary for LLM
  var cmdSummary = {};
  commands.forEach(function(c) {
    var base = (c.cmd || '').split(/\s/)[0];
    cmdSummary[base] = (cmdSummary[base] || 0) + 1;
  });
  var topCmds = Object.entries(cmdSummary).sort(function(a,b) { return b[1] - a[1]; }).slice(0, 15);

  var errorCmds = commands.filter(function(c) { return c.code && c.code !== 0; }).map(function(c) {
    return '[' + c.code + '] ' + c.cmd;
  }).slice(0, 10);

  var repos = {};
  commands.forEach(function(c) { if (c.repo) repos[c.repo] = (repos[c.repo] || 0) + 1; });

  var systemPrompt = 'You are a helpful shell history analyst. Analyze this shell log and provide a concise daily report. Format as:\n\n## Summary\n[2-3 sentences about the day]\n\n## Productivity Patterns\n[observations about work patterns, peak hours, focus areas]\n\n## Errors & Issues\n[common errors and possible solutions]\n\n## Recommendations\n[1-2 actionable suggestions]\n\nKeep it concise. No fluff.';

  var userMsg = 'Daily shell log (' + commands.length + ' commands):\n\n';
  userMsg += 'Top commands: ' + topCmds.map(function(c) { return c[0] + '(' + c[1] + ')'; }).join(', ') + '\n';
  userMsg += 'Errors: ' + errorCmds.join('; ') + '\n';
  userMsg += 'Repos: ' + JSON.stringify(repos) + '\n';
  userMsg += 'Time range: ' + (commands[0].t || '') + ' to ' + (commands[commands.length-1].t || '');

  var msgs = [
    {role:'system', content: systemPrompt},
    {role:'user', content: userMsg}
  ];

  await AI.streamChat(msgs, [], {
    onContent: function(text) {
      reportEl.textContent = text;
    },
    onDone: function(msg) {
      reportEl.textContent = msg.content || 'No analysis generated.';
    },
    onError: function(err) {
      reportEl.textContent = 'Error: ' + err;
    }
  });
}

function escHtml(s) {
  var div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}
</script>
</body>
</html>
